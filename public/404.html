<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect for mobile and desktop
    // Store the current path and redirect to index.html
    (function() {
      var pathSegmentsToKeep = 1; // Keep /task-management-system/
      
      var l = window.location;
      
      // Store the full URL we want to redirect to
      sessionStorage.setItem('redirect', l.href);
      
      // Build the redirect URL
      var redirect = l.protocol + '//' + l.host + '/' + 
        l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/') + 
        '/index.html';
      
      // Add query string and hash if they exist
      if (l.search) {
        redirect += l.search;
      }
      if (l.hash) {
        redirect += l.hash;
      }
      
      // Force redirect
      l.replace(redirect);
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9fafb;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    p {
      color: #6b7280;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting...</p>
  </div>
</body>
</html>
