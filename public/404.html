<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskFlow - Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect
    // Store the path and redirect to index.html
    sessionStorage.redirect = location.href;
    location.replace(location.origin + location.pathname.split('/').slice(0, -1).join('/') + '/index.html' + 
      (location.search || '') + (location.hash || ''));
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
