    <!-- GitHub Pages SPA redirect script -->
    <script>
      // Restore the URL after redirect from 404.html
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        sessionStorage.removeItem('redirect');
        
        if (redirect && redirect !== location.href) {
          // Extract the path from the stored redirect URL
          var redirectUrl = new URL(redirect);
          var currentUrl = new URL(location.href);
          
          // Only redirect if the paths are different
          if (redirectUrl.pathname !== currentUrl.pathname || 
              redirectUrl.search !== currentUrl.search || 
              redirectUrl.hash !== currentUrl.hash) {
            history.replaceState(null, null, redirectUrl.pathname + redirectUrl.search + redirectUrl.hash);
          }
        }
      })();
    </script>
